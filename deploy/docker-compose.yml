# EvenFoundryVTT Bridge — Production-shape Docker Compose
#
# Usage (from deploy/ directory):
#   docker compose up -d --build
#
# Security notes:
#   - T-03-17: secrets supplied via env_file at runtime, NEVER via build args.
#   - T-03-18: deploy/.env is gitignored. Copy deploy/.env.example to deploy/.env
#     and fill in real values before running.
#   - T-03-19: port is bound to all interfaces by default (homelab single-tenant).
#     For single-host, change to "127.0.0.1:8910:8910" to restrict to localhost.
#
# Env file: deploy/.env (gitignored, see deploy/.env.example for template)

# Compose project name → container/network prefix (otherwise Compose defaults to the
# directory name "deploy"). Containers: evf-bridge, evf-foundry-mcp; network: evenfoundryvtt_default.
name: evenfoundryvtt

services:
  bridge:
    container_name: evf-bridge
    # Same greyscale d20 icon as the Even Hub listing; Compose UIs (Portainer/Dockge/Komodo)
    # that read a container icon label will pick this up.
    labels:
      com.evenfoundryvtt.icon: "https://raw.githubusercontent.com/Aiacos/EvenFoundryVTT/main/assets/icon/icon.png"
      org.opencontainers.image.title: "EvenFoundryVTT Bridge"
    build:
      context: ..
      dockerfile: deploy/bridge.Dockerfile
    ports:
      - "8910:8910"
    # Player-view secrets/config (EVF_PLAYER_VIEW_*, incl. EVF_PLAYER_VIEW_STREAM_USER
    # — the Foundry world user the `streaming` map joins as) are loaded from .env here.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - PORT=8910
    volumes:
      # Headless player-view (ADR-0015 §C P2): the saved Forge session
      # (storageState) produced by the one-time `bootstrap:auth` login. Host dir
      # `deploy/secrets/` is gitignored; mounted read-only into the container at
      # the path EVF_PLAYER_VIEW_STORAGE_STATE points to (/app/secrets).
      - ./secrets:/app/secrets:ro
    # GPU passthrough for the headless player-view Chromium: the host AMD GPU
    # gives hardware WebGL (Mesa radeonsi) so Foundry's PIXI world loads fast.
    # Software GL (llvmpipe) is too slow. Harmless if no player-view mode is used.
    # group_add: the render(992)/video(44) gids that own /dev/dri on the host.
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "992"
      - "44"
    healthcheck:
      # 127.0.0.1 (not localhost): inside the container `localhost` also resolves to ::1 (IPv6),
      # but the server binds IPv4 0.0.0.0 only → a localhost healthcheck hits ::1 and reports
      # "connection refused" (false unhealthy). Force IPv4.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8910/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  foundry-mcp:
    container_name: evf-foundry-mcp
    build:
      context: ..
      dockerfile: deploy/foundry-mcp.Dockerfile
    ports:
      - "8911:8911"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - MCP_HTTP_PORT=8911
    depends_on:
      bridge:
        condition: service_healthy
    healthcheck:
      # Force IPv4 (see bridge healthcheck note).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8911/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
