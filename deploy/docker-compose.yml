# EvenFoundryVTT Bridge — Production-shape Docker Compose
#
# Usage (from deploy/ directory):
#   docker compose up -d --build
#
# Security notes:
#   - T-03-17: secrets supplied via env_file at runtime, NEVER via build args.
#   - T-03-18: deploy/.env is gitignored. Copy deploy/.env.example to deploy/.env
#     and fill in real values before running.
#   - T-03-19: port is bound to all interfaces by default (homelab single-tenant).
#     For single-host, change to "127.0.0.1:8910:8910" to restrict to localhost.
#
# Env file: deploy/.env (gitignored, see deploy/.env.example for template)

# Compose project name → container/network prefix (otherwise Compose defaults to the
# directory name "deploy"). Containers: evf-bridge, evf-foundry-mcp; network: evenfoundryvtt_default.
name: evenfoundryvtt

services:
  bridge:
    container_name: evf-bridge
    # Same greyscale d20 icon as the Even Hub listing; Compose UIs (Portainer/Dockge/Komodo)
    # that read a container icon label will pick this up.
    labels:
      com.evenfoundryvtt.icon: "https://raw.githubusercontent.com/Aiacos/EvenFoundryVTT/main/assets/icon/icon.png"
      org.opencontainers.image.title: "EvenFoundryVTT Bridge"
    build:
      context: ..
      dockerfile: deploy/bridge.Dockerfile
    ports:
      - "8910:8910"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - PORT=8910
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8910/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  foundry-mcp:
    container_name: evf-foundry-mcp
    build:
      context: ..
      dockerfile: deploy/foundry-mcp.Dockerfile
    ports:
      - "8911:8911"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - MCP_HTTP_PORT=8911
    depends_on:
      bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8911/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
