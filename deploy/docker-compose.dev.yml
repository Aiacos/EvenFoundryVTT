# EvenFoundryVTT Bridge — Development override for docker-compose.yml
#
# Merges on top of docker-compose.yml. Usage (from deploy/ directory):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Overrides:
#   - build from source (base compose pulls the GHCR image for prod auto-deploy;
#     this override restores the local build so `--build` compiles your working tree)
#   - LOG_LEVEL=debug for verbose bridge logging
#   - EVF_PLUGIN_HOST_URL fallback for local Vite dev server (port 5173)
#   - NODE_ENV kept as production to exercise the real startup guard path
#     (if you want dev-mode guard skip, change to development here)

services:
  bridge:
    # Restore the source build that the base compose drops in favour of the GHCR image.
    # `--build` then compiles the local tree and tags it as the base `image:` name.
    build:
      context: ..
      dockerfile: deploy/bridge.Dockerfile
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=debug
      - EVF_PLUGIN_HOST_URL=http://localhost:5173
