# EVF CI Workflow — D-1.09 (GitHub Actions) + D-1.10 (7 quality gates)
# Source: github.com/pnpm/action-setup (verified 2026-05-11)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # changeset status --since=main needs full history

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # D-1.10 gate 1: deterministic install (T-01-01 mitigation)
      # --ignore-scripts avoids Husky prepare on shallow clone (Pitfall 4)
      - name: Install dependencies (frozen-lockfile + ignore-scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      # D-1.10 gate 2: Biome lint + format (read-only `ci` mode)
      - name: Biome CI
        run: pnpm biome ci .

      # D-1.10 gate 3: TS strict per package
      - name: TypeScript typecheck
        run: pnpm typecheck

      # D-1.10 gate 4: Vitest coverage
      - name: Vitest with coverage
        run: pnpm test:coverage

      # D-1.10 gate 5: // TODO discipline (INV-4)
      # Pattern matches // TODO that is NOT followed by (#NN) or (ADR-NNNN)
      - name: TODO discipline grep
        run: |
          if grep -RnE '// TODO(?!\((#[0-9]+|ADR-[0-9]+)\))' \
              --include='*.ts' --include='*.tsx' --include='*.js' \
              packages/ docs/architecture/ 2>/dev/null; then
            echo "::error::Found // TODO without (#issue) or (ADR-NNNN) reference"
            exit 1
          fi

      # D-1.10 gate 6: snapshot drift (Vitest fails when --update=false finds mismatch)
      - name: Snapshot drift check
        run: pnpm vitest --run --update=false

      # D-1.10 gate 7: changeset status (PR only — main branch doesn't need to declare changes)
      - name: Changeset status
        if: github.event_name == 'pull_request'
        run: pnpm changeset:status

      # D-7.01 gate 8: Single-workflow-origin guard (Phase 7 ADR-0011 + Plan 07-01)
      # The ONLY valid call sites for activity.use() are in:
      #   packages/foundry-module/src/write-path/handlers/*.ts
      # Any hit in g2-app or bridge is a client-side write bypass — critical security
      # violation of the single-workflow-origin discipline (T-07-01 mitigation).
      # @see docs/architecture/0011-foundry-write-path-single-workflow-origin.md
      - name: Single-workflow-origin guard (ADR-0011)
        run: |
          if grep -rE 'activity\.use\(' packages/g2-app packages/bridge --include="*.ts" 2>/dev/null; then
            echo "::error::Client-side activity.use() call detected in packages/g2-app or packages/bridge."
            echo "::error::All write-path mutations must go through packages/foundry-module/src/write-path/handlers/."
            echo "::error::See docs/architecture/0011-foundry-write-path-single-workflow-origin.md (ADR-0011)"
            exit 1
          fi

      # Phase 15 gate: SKT-02 drift-gate import path probe (WR-07 hardening)
      # The shared-protocol SKT-02 test imports SPELL_LOOKUP from foundry-mcp via a
      # hard-coded relative path (cross-package test-only import). If foundry-mcp is
      # restructured (src/ moved to source/, spell-lookup.ts moved into a subdir),
      # the test fails with a confusing 'Cannot resolve module' rather than an
      # explicit 'drift gate broken' signal. This probe fails loudly BEFORE the
      # Vitest run with a precise error pointing both sides at the contract.
      - name: SKT-02 drift gate import-path probe (Phase 15 WR-07)
        run: |
          src=packages/foundry-mcp/src/voice/spell-lookup.ts
          test=packages/shared-protocol/src/voice/spell-keyterms.test.ts
          rel='../../../foundry-mcp/src/voice/spell-lookup.js'
          if ! test -f "$src"; then
            echo "::error file=$test::SKT-02 drift gate broken: $src missing."
            echo "::error::The cross-package test-only import in spell-keyterms.test.ts hard-codes"
            echo "::error::$rel — moving spell-lookup.ts requires updating that path."
            exit 1
          fi
          if ! grep -q '^export const SPELL_LOOKUP' "$src"; then
            echo "::error file=$src::SKT-02 drift gate broken: SPELL_LOOKUP export missing or renamed."
            echo "::error::spell-keyterms.test.ts imports it by name — rename in lock-step."
            exit 1
          fi
          if ! grep -qF "$rel" "$test"; then
            echo "::error file=$test::SKT-02 drift gate broken: relative import path $rel no longer present in test."
            echo "::error::Update this CI gate alongside the test if the contract intentionally changed."
            exit 1
          fi

  commit-lint-pr-title:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # T-01-04 mitigation: server-side commitlint cannot be bypassed by --no-verify
      # T-01-03 mitigation: PR title interpolated via env block (NOT inlined into bash run:),
      #                     preventing shell injection via crafted PR titles
      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | pnpm commitlint
